# .github/workflows/firebase-hosting.yml
# Deploy previews on PRs & manual; deploy to production on push

name: Deploy to Firebase Hosting
on:
  pull_request:
  workflow_dispatch:
    inputs:
      channel_id:
        description: "Preview channel ID (required for manual runs)"
        required: true
      expire:
        description: "Preview expiry (e.g., 7d, 2h). Leave blank for default."
        required: false
        default: ""
  push:
    branches: [ "main" ]  # change if you want other branches

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # --- PR previews (auto channel) ---
  preview_on_pr:
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & Build
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          if npm run | grep -qE '^  build'; then npm run build; else echo "No build script; skipping"; fi

      - name: Deploy preview to Firebase Hosting (PR)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ github.token }}  # <- use github.token, not secrets.GITHUB_TOKEN
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRAINING_20250915 }}
          projectId: training-20250915
          # channelId omitted on PRs -> action creates PR-specific preview automatically

  # --- Manual previews (requires channel_id) ---
  preview_on_manual:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & Build
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          if npm run | grep -qE '^  build'; then npm run build; else echo "No build script; skipping"; fi

      - name: Deploy preview to Firebase Hosting (manual)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ github.token }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRAINING_20250915 }}
          projectId: training-20250915
          channelId: ${{ inputs.channel_id }}                    # required for manual runs
          expires:   ${{ inputs.expire != '' && inputs.expire || '' }}

  # --- Production deploy on push to main ---
  deploy_on_push:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    env:
      FIREBASE_DEBUG: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & Build
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          if npm run | grep -qE '^  build'; then npm run build; else echo "No build script; skipping"; fi

      - name: Prepare service account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TRAINING_20250915 }}' > "$RUNNER_TEMP/sa.json"
          jq -e . "$RUNNER_TEMP/sa.json" >/dev/null 2>&1 || { echo "::error::Invalid service account JSON"; exit 1; }

      - name: Deploy to Firebase Hosting (production)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          npx --yes firebase-tools --version
          npx --yes firebase-tools deploy --only hosting --project training-20250915
